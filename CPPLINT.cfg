# cpplint configuration for gz_sensors_ouster.
#
# We mirror upstream gazebosim/gz-sensors's cpplint gate, but the project's
# .clang-format (BasedOnStyle: Google with several deliberate overrides)
# clashes with parts of cpplint's strict Google rule set. Each disabled
# category below corresponds to an intentional .clang-format choice — not
# a desire to silence the linter wholesale. Real signals (whitespace/parens,
# build/include_what_you_use) stay enabled and use inline NOLINT comments
# at the few false-positive sites (OpenMP pragmas, CUDA math builtins).

linelength=100

# Categories disabled below, with rationale (.clang-format / project idiom):
#   whitespace/braces            — Allman in some scopes (per AfterClass: false in .clang-format).
#   whitespace/indent            — AccessModifierOffset: -2 makes public:/private: flush-left.
#   whitespace/comments          — single-space-before-comment is fine for short trailing comments.
#   whitespace/line_length       — already enforced by .clang-format ColumnLimit; double-flagging is noise.
#   build/include_order          — project orders includes by logical grouping, not Google's strict order.
#   build/include_subdir         — sibling-relative includes (#include "foo.h") used inside cuda/ and test/.
#   runtime/references           — non-const reference output params are the project's deliberate idiom.
#   runtime/int                  — overzealous in CUDA/SYCL device code where platform types matter.
#   runtime/indentation_namespace — project deliberately indents inside namespaces.
#   build/c++11                  — flags <chrono>/<mutex>/<thread>/<condition_variable>; obsolete
#                                  legacy from early Google-internal C++11 caution. Standard C++17 now.
filter=-whitespace/braces,-whitespace/indent,-whitespace/comments,-whitespace/line_length,-build/include_order,-build/include_subdir,-runtime/references,-runtime/int,-runtime/indentation_namespace,-build/c++11
