name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check license headers (SPDX)
        run: |
          missing=""
          for f in $(find src include cuda -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.cu' -o -name '*.cuh' -o -name '*.h' \)); do
            if ! head -2 "$f" | grep -q 'SPDX-License-Identifier'; then
              missing="$missing $f"
            fi
          done
          if [ -n "$missing" ]; then
            echo "Missing SPDX header:$missing"
            exit 1
          fi
          echo "All source files have SPDX headers."

      - name: Check clang-format config exists
        run: test -f .clang-format

  build:
    name: Build (CPU fallback)
    runs-on: ubuntu-latest
    container:
      image: osrf/ros:jazzy-desktop
    env:
      # ouster-ros source is pinned to jcfurey/ouster-ros (workspace fork)
      # because it carries an in-tree ouster-sdk submodule at v0.16.2+. The
      # apt package ros-${ROS_DISTRO}-ouster-ros lags (currently 0.14.1) and
      # exposes an older PacketWriter::set_block signature that the plugin
      # source no longer targets. Bump OUSTER_ROS_REF to a tag/SHA for stricter
      # reproducibility once the workspace settles on one.
      OUSTER_ROS_REPO: https://github.com/jcfurey/ouster-ros.git
      OUSTER_ROS_REF: ros2
    steps:
      - uses: actions/checkout@v4
        with:
          path: src/gz_sensors_ouster

      - name: Clone ouster-ros (jcfurey fork)
        run: |
          git clone --depth 1 --branch "${OUSTER_ROS_REF}" --recurse-submodules \
            "${OUSTER_ROS_REPO}" src/ouster-ros

      - name: Install gz_sensors_ouster-only apt deps
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            ros-${ROS_DISTRO}-gz-sim-vendor \
            ros-${ROS_DISTRO}-gz-rendering-vendor \
            ros-${ROS_DISTRO}-gz-sensors-vendor \
            ros-${ROS_DISTRO}-gz-plugin-vendor \
            libeigen3-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Resolve ouster-ros + gz_sensors_ouster system deps via rosdep
        run: |
          rosdep update --rosdistro=${ROS_DISTRO}
          rosdep install --from-paths src --rosdistro=${ROS_DISTRO} -y --ignore-src
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Build (ouster_sensor_msgs → ouster_ros → gz_sensors_ouster)
        shell: bash
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          colcon build --cmake-args -DCMAKE_BUILD_TYPE=Release

      - name: Test
        shell: bash
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source install/setup.bash
          colcon test --packages-select gz_sensors_ouster --event-handlers console_direct+
          colcon test-result --verbose --all

  # ── Quality gates ────────────────────────────────────────────────────────────
  # Mirrors what gazebo-tooling/action-gz-ci runs on upstream gazebosim/gz-sensors:
  # cppcheck (static analysis), cpplint (Google C++ style), doxygen (doc-comment
  # lint), and package.xml schema validation. Each runs as its own job so PR
  # status checks show which gate failed.

  cppcheck:
    name: cppcheck (static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cppcheck
        env:
          DEBIAN_FRONTEND: noninteractive
      - name: Run cppcheck
        run: |
          # test/ excluded — gtest's TEST(...) / TEST_P(...) macros confuse
          # cppcheck's preprocessor and surface false-positive syntaxErrors.
          # GZ_ADD_PLUGIN is the gz-plugin2 registration macro; cppcheck can't
          # see its definition without the full Gazebo headers, so suppress
          # `unknownMacro` rather than chasing the toolchain.
          cppcheck --quiet \
            --enable=warning,style,performance,portability \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --error-exitcode=1 \
            -I include -I cuda \
            src/ include/ cuda/

  cpplint:
    name: cpplint (Google C++ style)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cpplint
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq python3-pip
          pip install --user --no-cache-dir cpplint==1.6.1
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        env:
          DEBIAN_FRONTEND: noninteractive
      - name: Run cpplint
        # CPPLINT.cfg at the repo root configures linelength + filter rules
        # (the rules we silence are documented inline in that file).
        run: cpplint --recursive src/ include/ cuda/ test/

  doxygen:
    name: doxygen (doc-comment lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install doxygen
        run: sudo apt-get update -qq && sudo apt-get install -y -qq doxygen graphviz
        env:
          DEBIAN_FRONTEND: noninteractive
      - name: Run doxygen
        # Doxyfile sets WARN_AS_ERROR=YES; HTML output is generated under /tmp
        # but discarded — this is a lint pass, not a docs-publish step.
        run: doxygen Doxyfile

  package-xml:
    name: Validate package.xml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gazebo-tooling/action-gz-ci/validate_package_xml@jammy

  # Compile-only smoke test for the HIP (AMD) backend. No AMD GPU in CI, so
  # we only verify the source compiles under hipcc. Runtime coverage must
  # be done on real ROCm hardware.
  hip-smoke:
    name: HIP smoke build (no device)
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-22.04:6.1-complete
    steps:
      - uses: actions/checkout@v4
      - name: Compile HIP backend in isolation
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -y -qq cmake build-essential
          mkdir -p /tmp/hip-smoke && cd /tmp/hip-smoke
          # Build just the HIP TU against its own includes; we don't have
          # the full ROS stack in this container, so we only check that the
          # HIP kernel source compiles. Link errors on unresolved Backend
          # symbols are expected and ignored.
          /opt/rocm/bin/hipcc -std=c++17 -fPIC -D__HIP_PLATFORM_AMD__=1 \
            -I$GITHUB_WORKSPACE/include -I$GITHUB_WORKSPACE/cuda \
            -c $GITHUB_WORKSPACE/cuda/ray_processor_hip.cpp \
            -o ray_processor_hip.o
          echo "HIP backend compiled OK."

  # Compile-only smoke test for the SYCL (Intel) backend. Uses the public
  # Intel oneAPI base-toolkit container. Same caveat as HIP — no device.
  sycl-smoke:
    name: SYCL smoke build (no device)
    runs-on: ubuntu-latest
    container:
      image: intel/oneapi-basekit:2024.2.1-0-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v4
      - name: Compile SYCL backend in isolation
        shell: bash
        run: |
          # The intel/oneapi-basekit image sets SETVARS_COMPLETED=1 in its
          # baked env, so a plain `. setvars.sh` exits with code 3 ("already
          # run") and bash -e aborts the step. --force re-runs idempotently
          # — the "excessive PATH" warning only matters in long-lived shells,
          # not a fresh CI runner.
          . /opt/intel/oneapi/setvars.sh --force
          icpx -fsycl -std=c++17 -fPIC \
            -I$GITHUB_WORKSPACE/include -I$GITHUB_WORKSPACE/cuda \
            -c $GITHUB_WORKSPACE/cuda/ray_processor_sycl.cpp \
            -o ray_processor_sycl.o
          echo "SYCL backend compiled OK."
